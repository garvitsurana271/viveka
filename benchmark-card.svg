<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="'IBM Plex Sans','Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="1080" height="560" fill="#F6F7F7"/>
  <rect x="40" y="40" width="1000" height="480" rx="16" fill="#FFFFFF" stroke="#E5E7E7"/>

  <!-- header -->
  <text x="72" y="92" font-size="13" fill="#727A84" font-family="'IBM Plex Mono',monospace" letter-spacing="2">VIVEKA · BENCHMARKED ON AVERITEC</text>
  <line x1="72" y1="108" x2="1008" y2="108" stroke="#E5E7E7"/>

  <!-- headline number -->
  <text x="72" y="210" font-size="96" font-weight="700" fill="#16181C" font-family="'IBM Plex Mono',monospace">0.733</text>
  <text x="360" y="178" font-size="20" font-weight="600" fill="#16181C">macro-F1</text>
  <text x="360" y="204" font-size="15" fill="#5A616A">gold-evidence reasoning (n=100)</text>
  <text x="360" y="226" font-size="13" fill="#727A84">verdict quality given good evidence</text>

  <!-- honest footnote box -->
  <rect x="72" y="248" width="936" height="58" rx="9" fill="#FBFCFC" stroke="#E5E7E7"/>
  <text x="88" y="272" font-size="12.5" fill="#3A3F47">Honest footnote: reported on a <tspan font-weight="600">balanced 25-per-class slice</tspan> (so macro-F1 is not inflated by AVeriTeC's ~61%-Refuted majority).</text>
  <text x="88" y="292" font-size="12.5" fill="#3A3F47">This is <tspan font-weight="600">label-only verdict quality</tspan>, not the official Ev2R AVeriTeC score (top published systems land around 0.48). Not a leaderboard rank.</text>

  <!-- live number -->
  <text x="72" y="356" font-size="40" font-weight="700" fill="#136F7A" font-family="'IBM Plex Mono',monospace">0.398</text>
  <text x="210" y="342" font-size="15" font-weight="600" fill="#16181C">live, end to end (n=40)</text>
  <text x="210" y="362" font-size="13" fill="#5A616A">the full pipeline retrieving its own evidence, published not hidden</text>
  <text x="210" y="380" font-size="13" fill="#946612">on the cases it cannot resolve, it abstains (~15%) and routes to a human instead of guessing</text>

  <!-- chips -->
  <g font-size="13" font-weight="600">
    <rect x="72" y="416" width="300" height="40" rx="9" fill="#E8F3EC"/>
    <text x="92" y="441" fill="#1C7C54">calibrated confidence (ECE 0.327 → ~0.21)</text>
    <rect x="388" y="416" width="240" height="40" rx="9" fill="#ECECF8"/>
    <text x="408" y="441" fill="#4B49B6">abstains when unsure (by design)</text>
    <rect x="644" y="416" width="220" height="40" rx="9" fill="#E5F0F1"/>
    <text x="664" y="441" fill="#0C5560">$0 · Gemma free tier</text>
  </g>

  <text x="72" y="492" font-size="11.5" fill="#9AA0A8" font-family="'IBM Plex Mono',monospace">Even with perfect gold evidence the engine abstains on ~36% of cases (the high-stakes confidence floor). n is small; read the decimals as directional.</text>
</svg>
