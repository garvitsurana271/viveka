<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="'IBM Plex Sans','Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9AA0A8"/>
    </marker>
    <marker id="arrowT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#136F7A"/>
    </marker>
  </defs>

  <rect width="1080" height="560" fill="#F6F7F7"/>

  <!-- title -->
  <text x="40" y="44" font-size="22" font-weight="700" fill="#16181C">Viveka</text>
  <text x="118" y="44" font-size="13" fill="#727A84" font-family="'IBM Plex Mono',monospace" letter-spacing="1.5">VERIFICATION WORKSPACE  ·  ONE ENGINE  ·  $0 FREE TIER</text>
  <line x1="40" y1="60" x2="1040" y2="60" stroke="#E5E7E7"/>

  <!-- INPUT -->
  <rect x="40" y="110" width="150" height="92" rx="10" fill="#FFFFFF" stroke="#D5D8D8"/>
  <text x="115" y="138" font-size="11" font-weight="700" fill="#727A84" text-anchor="middle" font-family="'IBM Plex Mono',monospace" letter-spacing="1">INPUT</text>
  <text x="115" y="162" font-size="13" fill="#16181C" text-anchor="middle">text · image</text>
  <text x="115" y="180" font-size="13" fill="#16181C" text-anchor="middle">· voice</text>
  <text x="115" y="196" font-size="10.5" fill="#9AA0A8" text-anchor="middle">any language</text>

  <!-- MEMORY shortcut -->
  <rect x="230" y="78" width="170" height="56" rx="10" fill="#E5F0F1" stroke="#BFDADD"/>
  <text x="315" y="100" font-size="11" font-weight="700" fill="#136F7A" text-anchor="middle" font-family="'IBM Plex Mono',monospace" letter-spacing="1">ANTIBODY MEMORY</text>
  <text x="315" y="120" font-size="11.5" fill="#3A3F47" text-anchor="middle">known rumour → instant, no LLM</text>

  <!-- arrow input -> stages -->
  <line x1="190" y1="156" x2="228" y2="156" stroke="#9AA0A8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- input -> memory -->
  <path d="M150,110 C150,90 200,106 230,106" fill="none" stroke="#136F7A" stroke-width="1.5" marker-end="url(#arrowT)"/>

  <!-- 4 STAGES -->
  <g>
    <rect x="230" y="146" width="150" height="92" rx="10" fill="#FFFFFF" stroke="#E5E7E7"/>
    <text x="305" y="170" font-size="11" font-weight="700" fill="#136F7A" text-anchor="middle" font-family="'IBM Plex Mono',monospace">1 · ANALYZE</text>
    <text x="305" y="192" font-size="12" fill="#16181C" text-anchor="middle">claims +</text>
    <text x="305" y="208" font-size="12" fill="#16181C" text-anchor="middle">questions</text>
    <text x="305" y="226" font-size="10.5" fill="#9AA0A8" text-anchor="middle">Gemma 4</text>

    <rect x="408" y="146" width="150" height="92" rx="10" fill="#FFFFFF" stroke="#E5E7E7"/>
    <text x="483" y="170" font-size="11" font-weight="700" fill="#136F7A" text-anchor="middle" font-family="'IBM Plex Mono',monospace">2 · RETRIEVE</text>
    <text x="483" y="192" font-size="12" fill="#16181C" text-anchor="middle">web · Wiki ·</text>
    <text x="483" y="208" font-size="12" fill="#16181C" text-anchor="middle">Fact Check</text>
    <text x="483" y="226" font-size="10.5" fill="#9AA0A8" text-anchor="middle">full-document</text>

    <rect x="586" y="146" width="150" height="92" rx="10" fill="#FFFFFF" stroke="#E5E7E7"/>
    <text x="661" y="170" font-size="11" font-weight="700" fill="#136F7A" text-anchor="middle" font-family="'IBM Plex Mono',monospace">3 · REASON</text>
    <text x="661" y="192" font-size="12" fill="#16181C" text-anchor="middle">Likert-softmax</text>
    <text x="661" y="208" font-size="12" fill="#16181C" text-anchor="middle">over 4 labels</text>
    <text x="661" y="226" font-size="10.5" fill="#9AA0A8" text-anchor="middle">Gemma 4</text>

    <rect x="764" y="146" width="150" height="92" rx="10" fill="#FFFFFF" stroke="#E5E7E7"/>
    <text x="839" y="170" font-size="11" font-weight="700" fill="#136F7A" text-anchor="middle" font-family="'IBM Plex Mono',monospace">4 · CALIBRATE</text>
    <text x="839" y="192" font-size="12" fill="#16181C" text-anchor="middle">abstain margin</text>
    <text x="839" y="208" font-size="12" fill="#16181C" text-anchor="middle">+ confidence</text>
    <text x="839" y="226" font-size="10.5" fill="#9AA0A8" text-anchor="middle">domain-aware</text>
  </g>
  <line x1="380" y1="192" x2="406" y2="192" stroke="#9AA0A8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="558" y1="192" x2="584" y2="192" stroke="#9AA0A8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="736" y1="192" x2="762" y2="192" stroke="#9AA0A8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GATE -->
  <rect x="764" y="280" width="150" height="74" rx="10" fill="#FBFCFC" stroke="#D5D8D8"/>
  <text x="839" y="304" font-size="11" font-weight="700" fill="#946612" text-anchor="middle" font-family="'IBM Plex Mono',monospace">HIGH-STAKES GATE</text>
  <text x="839" y="324" font-size="11" fill="#3A3F47" text-anchor="middle">health/communal/disaster</text>
  <text x="839" y="340" font-size="11" fill="#3A3F47" text-anchor="middle">needs an authoritative source</text>
  <line x1="839" y1="238" x2="839" y2="278" stroke="#9AA0A8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- HUMAN REVIEW -->
  <rect x="586" y="290" width="150" height="56" rx="10" fill="#ECECF8" stroke="#D2D2F0"/>
  <text x="661" y="314" font-size="11" font-weight="700" fill="#4B49B6" text-anchor="middle" font-family="'IBM Plex Mono',monospace">HUMAN REVIEW</text>
  <text x="661" y="332" font-size="11" fill="#4B49B6" text-anchor="middle">low confidence / no source</text>
  <path d="M764,317 L738,317" fill="none" stroke="#4B49B6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OUTPUT -->
  <rect x="40" y="392" width="1000" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7E7"/>
  <text x="62" y="420" font-size="11" font-weight="700" fill="#727A84" font-family="'IBM Plex Mono',monospace" letter-spacing="1">OUTPUT · VERIFICATION REPORT</text>

  <g font-size="12.5" fill="#16181C">
    <rect x="62" y="436" width="150" height="30" rx="7" fill="#E8F3EC"/><text x="137" y="456" text-anchor="middle" fill="#1C7C54" font-weight="600">verdict (1 of 5)</text>
    <rect x="224" y="436" width="170" height="30" rx="7" fill="#F1F3F3"/><text x="309" y="456" text-anchor="middle">calibrated confidence</text>
    <rect x="406" y="436" width="150" height="30" rx="7" fill="#F1F3F3"/><text x="481" y="456" text-anchor="middle">clickable evidence</text>
    <rect x="568" y="436" width="160" height="30" rx="7" fill="#F1F3F3"/><text x="648" y="456" text-anchor="middle">forward-ready reply</text>
  </g>
  <text x="62" y="492" font-size="12.5" fill="#3A3F47"><tspan font-weight="700" fill="#136F7A">ACT (gated, region-adaptive):</tspan> warn the group · report  (IN: Chakshu/1930/PIB · US: FTC/IC3/FCC) · protect · or route to a human</text>

  <!-- calibrate -> output -->
  <path d="M839,354 C839,372 600,378 540,390" fill="none" stroke="#9AA0A8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="1040" y="540" font-size="10.5" fill="#9AA0A8" text-anchor="end" font-family="'IBM Plex Mono',monospace">any stage fails → human review   ·   no key → canned reasoning (demo-safe)</text>
</svg>
